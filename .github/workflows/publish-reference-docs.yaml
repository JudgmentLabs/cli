name: Publish CLI Reference Docs

on:
  push:
    branches: [main]
    paths:
      - "src/judgment_cli/**"
      - "scripts/generate_reference.py"

jobs:
  publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cli repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Render CLI reference MDX
        run: uv run python scripts/generate_reference.py --out dist/cli-reference

      - name: Get commit info
        id: commit
        run: |
          sha_short=$(git rev-parse --short HEAD)
          echo "sha_short=$sha_short" >> $GITHUB_OUTPUT
          message=$(git log -1 --pretty=%s)
          # Escape backticks/quotes that would break a YAML/JSON body.
          echo "message=$message" >> $GITHUB_OUTPUT

      - name: Clone docs repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_GITHUB_PAT }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/JudgmentLabs/docs.git" docs-repo
          cd docs-repo
          git config user.name "Judgment Release Bot"
          git config user.email "release-bot@judgmentlabs.ai"
          git checkout -b "auto-cli-reference/${{ steps.commit.outputs.sha_short }}"

      - name: Replace generated reference tree
        run: |
          target=docs-repo/content/docs/sdk-reference/cli
          rm -rf "$target"
          mkdir -p "$target"
          cp -R dist/cli-reference/* "$target/"

      - name: Detect changes
        id: changes
        run: |
          cd docs-repo
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --short
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cd docs-repo
          git add content/docs/sdk-reference/cli
          git commit -m "$(cat <<'EOF'
          docs: regenerate CLI reference from cli@${{ steps.commit.outputs.sha_short }}

          Source commit: ${{ github.sha }}
          Source message: ${{ steps.commit.outputs.message }}

          This PR was automatically generated by scripts/generate_reference.py
          in the JudgmentLabs/cli repo. Do not hand-edit files under
          content/docs/sdk-reference/cli/ — they will be overwritten on the
          next CLI change.
          EOF
          )"
          git push origin "auto-cli-reference/${{ steps.commit.outputs.sha_short }}"

      - name: Open PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_GITHUB_PAT }}
        run: |
          cd docs-repo
          gh pr create \
            --title "[Auto Docs] Regenerate CLI reference" \
            --label "auto-docs" \
            --body "$(cat <<'EOF'
          ## Summary

          Automated regeneration of `content/docs/sdk-reference/cli/` from the
          `judgment` Click command tree.

          ### Source change
          - **Repository**: ${{ github.repository }}
          - **Commit**: [${{ steps.commit.outputs.sha_short }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          - **Message**: ${{ steps.commit.outputs.message }}

          ### Notes
          - Files under `content/docs/sdk-reference/cli/` are auto-generated. Do not hand-edit.
          - The generator lives at `scripts/generate_reference.py` in `JudgmentLabs/cli`.
          - For CLI guides (install, auth, quickstart), see `content/docs/documentation/cli.mdx` — that page is hand-maintained and drifted by the `notify-docs-update.yaml` workflow.
          EOF
          )" \
            --base staging \
            --head "auto-cli-reference/${{ steps.commit.outputs.sha_short }}"

      - name: Summary
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "Opened CLI reference PR against JudgmentLabs/docs."
          else
            echo "CLI surface unchanged — no PR opened."
          fi
